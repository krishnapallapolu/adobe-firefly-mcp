name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Smoke test
        env:
          FIREFLY_CLIENT_ID: dummy-ci
          FIREFLY_CLIENT_SECRET: dummy-ci
          MCP_BEARER_TOKEN: dummy-ci-token-minimum-32-characters-here
          PORT: "6002"
        run: |
          node dist/index.js &
          SERVER_PID=$!
          sleep 2
          # Health endpoint should work
          curl --fail http://localhost:6002/healthz
          # Unauthenticated MCP request should 401
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:6002/mcp -H "Content-Type: application/json" -d '{}')
          if [ "$STATUS" != "401" ]; then
            echo "Expected 401 for missing bearer, got $STATUS"
            kill $SERVER_PID
            exit 1
          fi
          kill $SERVER_PID
          echo "Smoke test passed"
